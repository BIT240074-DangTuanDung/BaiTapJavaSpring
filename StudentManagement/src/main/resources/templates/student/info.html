<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin sinh viên</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 8px; max-width: 400px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #4CAF50; padding-bottom: 8px; }
        p { font-size: 16px; color: #555; line-height: 1.6; }
        span { font-weight: bold; color: #222; }
    </style>
</head>
<body>

<div class="card">
    <h2>Thông tin sinh viên</h2>
    <p>Họ và tên: <span th:text="${sv.name}">Tên mặc định</span></p>
    <p>Tuổi: <span th:text="${sv.age}">0</span></p>
    <p>Chuyên ngành: <span th:text="${sv.major}">Ngành mặc định</span></p>
</div>

</body>
</html>
